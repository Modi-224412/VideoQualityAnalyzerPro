services:
  videoanalyzer:
    image: ghcr.io/modi-224412/videoqualityanalyzer:latest
    container_name: VideoQualityAnalyzerPro
    ports:
      - "2498:2498"
    volumes:
      # Reports – werden in den Appdata-Ordner gespeichert
      - /mnt/user/appdata/VideoQualityAnalyzerPro/reports:/app/reports
      # Einstellungen & Queue persistent (config.json + queue.json werden beim Start automatisch angelegt)
      - /mnt/user/appdata/VideoQualityAnalyzerPro:/app/persistent
      # Medienordner – hier deine Videos angeben (read-only)
      - /mnt/user/downloads:/data:ro
    command: sh -c "mkdir -p /app/persistent && [ -f /app/persistent/config.json ] || echo '{}' > /app/persistent/config.json && [ -f /app/persistent/queue.json ] || echo '{}' > /app/persistent/queue.json && exec python3 web_app.py"
    # ── StaxRip Integration (optional) ────────────────────────────────────────
    # Pipeline-Ordner einmalig auf dem NAS anlegen:
    #   mkdir -p /mnt/user/downloads/Pruefung/Bearbeitung
    #   mkdir -p /mnt/user/downloads/Pruefung/Fertig
    environment:
      - TZ=Europe/Berlin
    # ── NVIDIA GPU (nur wenn Unraid NVIDIA Plugin installiert ist) ─────────────
    # Ohne NVIDIA GPU: die deploy-Sektion auskommentiert lassen
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
